# Flatpak manifest for Projectum.
#
# Fully pinned and offline-buildable (yt-dlp wheel + the v2.3.0 source tarball,
# both with sha256). yt-dlp's only dependencies are optional extras, so a
# --no-deps install of the base wheel is correct; PySide6 comes from the
# io.qt.PySide.BaseApp. Remaining steps for a Flathub submission:
#   1. Build & test locally:
#        flatpak install flathub org.kde.Sdk//6.8 org.kde.Platform//6.8 io.qt.PySide.BaseApp//6.8
#        flatpak-builder --user --install --force-clean build-dir io.github.wleeaf.Projectum.yml
#        flatpak run io.github.wleeaf.Projectum
#   2. Validate metadata: appstreamcli validate ...metainfo.xml ; desktop-file-validate ...desktop
#   3. Submit to github.com/flathub/flathub (a new-pr branch) and iterate with reviewers.
#      Bump both pinned versions (this file + the metainfo release list) each release.
id: io.github.wleeaf.Projectum
runtime: org.kde.Platform
runtime-version: "6.8"
sdk: org.kde.Sdk
base: io.qt.PySide.BaseApp
base-version: "6.8"
command: projectum

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network          # yt-dlp fetches playlist metadata
  - --filesystem=home        # open and track project folders

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - "*.a"
  - "*.la"

modules:
  - name: yt-dlp
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} --no-deps --no-build-isolation
        yt_dlp-2026.6.9-py3-none-any.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/f3/ee/188a3dadf9dfdac713243521f919feca1cd091d4358c9ea7e8ebb710a7cc/yt_dlp-2026.6.9-py3-none-any.whl
        sha256: 442ba4c75724b9496144c8434b617962ee08d0ee7c26ec663848fe9b78d5a3e4

  - name: projectum
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} --no-deps --no-build-isolation .
      - install -Dm644 projectum/assets/icon.svg
        ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm644 packaging/flatpak/${FLATPAK_ID}.desktop
        ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 packaging/flatpak/${FLATPAK_ID}.metainfo.xml
        ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/wleeaf/projectum/archive/refs/tags/v2.4.0.tar.gz
        sha256: 1554e5b4369cca7c10e47f9b7b7cd662647f1dda06d7fbd2c76f9f3c5d411788
