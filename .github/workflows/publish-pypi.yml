name: Publish to PyPI

# Publishes the package to PyPI when a GitHub release is published.
#
# Uses PyPI Trusted Publishing (OIDC) — NO API token/secret required once the
# trusted publisher is configured on PyPI (see packaging/README.md):
#   PyPI project: projectum · owner: wleeaf · repo: projectum
#   workflow: publish-pypi.yml · environment: (leave blank)
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pypi:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
