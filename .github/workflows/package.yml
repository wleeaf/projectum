name: Package (Windows / macOS)

# Builds the unsigned Windows .exe and macOS .dmg.
#  • On every version tag (v*) the binaries are attached to the GitHub Release,
#    so a single `gh release create vX.Y.Z` ships all three platforms.
#  • On manual dispatch you can rebuild one platform without cutting a release
#    (artifacts only — the attach step is tag-gated).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      platform:
        description: Which platform(s) to build
        type: choice
        default: both
        options: [both, windows, macos]

permissions:
  contents: write  # attach binaries to the GitHub Release on tag pushes

jobs:
  windows:
    if: ${{ github.event_name == 'push' || inputs.platform == 'windows' || inputs.platform == 'both' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build Projectum.exe
        run: pyinstaller --noconfirm --onefile --windowed --name Projectum main.py
      - name: Sanity-check the binary launches (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          Start-Process -FilePath dist/Projectum.exe -PassThru | Out-Null
          Start-Sleep -Seconds 8
          if (Get-Process Projectum -ErrorAction SilentlyContinue) {
            Write-Host "launched OK"; Stop-Process -Name Projectum -Force
          } else {
            Write-Error "Projectum.exe exited early"; exit 1
          }
        shell: pwsh
      # Asset name is a hard contract with README + latest/download URLs.
      - name: Name the release asset
        run: Copy-Item dist/Projectum.exe Projectum-windows-x64.exe
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: Projectum-windows-x64
          path: Projectum-windows-x64.exe
          if-no-files-found: error
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Projectum-windows-x64.exe
          fail_on_unmatched_files: true

  macos:
    if: ${{ github.event_name == 'push' || inputs.platform == 'macos' || inputs.platform == 'both' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build Projectum.app
        run: pyinstaller --noconfirm --windowed --name Projectum main.py
      - name: Sanity-check the app launches (offscreen)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          ./dist/Projectum.app/Contents/MacOS/Projectum &
          pid=$!
          sleep 8
          if kill -0 "$pid" 2>/dev/null; then
            echo "launched OK"; kill "$pid"
          else
            echo "Projectum.app exited early"; exit 1
          fi
      # Asset name is a hard contract with README + latest/download URLs.
      - name: Package .dmg
        run: |
          hdiutil create -volname Projectum -srcfolder dist/Projectum.app \
            -ov -format UDZO Projectum-macos.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: Projectum-macos
          path: Projectum-macos.dmg
          if-no-files-found: error
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Projectum-macos.dmg
          fail_on_unmatched_files: true
